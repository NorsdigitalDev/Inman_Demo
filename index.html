<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INMAN COMPANY</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
  }

  body,
  html {
    width: 100%;
    height: 100%;
  }

  main img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* TOP SWITCHER */
  .page-switcher {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 999;

    display: none;
    gap: 8px;

    padding: 8px;

    border-radius: 999px;

    background: rgba(255,255,255,0.95);

    border: 1px solid #e8e8e8;

    box-shadow:
      0 8px 24px rgba(0,0,0,0.08);
  }

  .page-switcher.show {
    display: flex;
  }

  .page-btn {
    width: 38px;
    height: 38px;

    border: none;
    border-radius: 50%;

    background: transparent;

    color: #666;

    font-size: 13px;
    font-weight: 600;

    cursor: pointer;

    transition: .25s;
  }

  .page-btn:hover {
    background: #fff3ef;
    color: #3783da;
  }

  .page-btn.active {
    background: #3783da;
    color: white;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;

    left: 50%;
    bottom: 30px;

    transform: translateX(-50%);
    z-index: 999;

    display: flex;
    gap: 8px;

    padding: 8px;

    border-radius: 999px;

    background: rgba(255,255,255,0.95);

    border: 1px solid #e8e8e8;

    box-shadow:
      0 12px 30px rgba(0,0,0,0.08);
  }

  .nav-item {
    border: none;

    background: transparent;

    color: #444;

    cursor: pointer;

    padding: 11px 18px;

    border-radius: 999px;

    font-size: 14px;
    font-weight: 600;

    transition: .25s;
  }

  .nav-item:hover {
    background: #fff3ef;
    color: #3783da;
  }

  .nav-item.active {
    background: #3783da;
    color: white;
  }
</style>
  </head>

  <body>
    <!-- Background -->
    <main>
      <img
        id="main-image"
        src="./Home.svg"
        alt="Main Image"
      />
    </main>

    <!-- Top Switcher -->
    <div class="page-switcher" id="page-switcher"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
      <button class="nav-item active" onclick="changeSection('home', this)">
        Trang chủ
      </button>
      <button class="nav-item" onclick="changeSection('about', this)">
        Về INMAN
      </button>
      <button class="nav-item" onclick="changeSection('product', this)">
        Sản phẩm
      </button>
      <button class="nav-item" onclick="changeSection('news', this)">
        Tin tức
      </button>
      <button class="nav-item" onclick="changeSection('branch', this)">
        Chi nhánh
      </button>
      <button class="nav-item" onclick="changeSection('contact', this)">
        Liên hệ
      </button>
    </nav>

    <script>
      const pages = {
        home: ["./Demo_Iron/Demo_Iron/Home.svg"],

        about: [
          "./Demo_Iron/Demo_Iron/About/About_Profile.svg",
          "./Demo_Iron/Demo_Iron/About/About_Services.svg",
          "./Demo_Iron/Demo_Iron/About/About_Team.svg",
          "./Demo_Iron/Demo_Iron/About/About_Partners.svg",
        ],

        product: [
          "./Demo_Iron/Demo_Iron/Products/Product_List.svg",
          "./Demo_Iron/Demo_Iron/Products/Product_Detail.svg",
        ],

        news: [
          "./Demo_Iron/Demo_Iron/Posts/Post_List.svg",
          "./Demo_Iron/Demo_Iron/Posts/Post_Detail.svg",
        ],

        branch: ["./Branches.svg"],

        contact: ["./Contact.svg"],
      };

      let currentSection = "home";
      let currentPage = 0;

      function changeSection(section, btn) {
        currentSection = section;
        currentPage = 0;

        // Active nav
        document
          .querySelectorAll(".nav-item")
          .forEach((el) => el.classList.remove("active"));

        btn.classList.add("active");

        // Update image
        updateImage();

        // Render switcher
        renderSwitcher();
      }

      function updateImage() {
        document.getElementById("main-image").src =
          pages[currentSection][currentPage];
      }

      function renderSwitcher() {
        const switcher = document.getElementById("page-switcher");

        const total = pages[currentSection].length;

        // Nếu chỉ có 1 page -> ẩn
        if (total <= 1) {
          switcher.classList.remove("show");
          switcher.innerHTML = "";
          return;
        }

        switcher.classList.add("show");

        switcher.innerHTML = "";

        for (let i = 0; i < total; i++) {
          const btn = document.createElement("button");

          btn.className = "page-btn " + (i === currentPage ? "active" : "");

          btn.innerText = String(i + 1).padStart(2, "0");

          btn.onclick = () => {
            currentPage = i;

            updateImage();

            renderSwitcher();
          };

          switcher.appendChild(btn);
        }
      }
    </script>
  </body>
</html>
