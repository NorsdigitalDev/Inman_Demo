<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INMAN COMPANY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
        }

        main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Ảnh ẩn thì không chiếm chỗ, không hiện */
        main img.hidden {
            display: none;
        }

        .lang-switcher {
            position: fixed;
            top: 18px;
            right: 18px;
            z-index: 999;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 30px;
            padding: 4px;
            gap: 2px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.13);
        }

        .lang-btn {
            padding: 6px 16px;
            border-radius: 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.03em;
            color: #444;
            transition: background 0.25s, color 0.25s, transform 0.15s;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.4;
        }

        .lang-btn.active {
            background: #fff;
            color: #111;
            box-shadow: 0 2px 8px rgba(0,0,0,0.13);
        }

        .lang-btn:not(.active):hover {
            background: rgba(255,255,255,0.35);
            transform: scale(1.04);
        }

        .lang-btn span.flag {
            margin-right: 5px;
            font-size: 15px;
        }
    </style>
</head>

<body>
    <main>
        <img id="img-zh" src="./Home_page_China.svg" alt="home" />
        <img id="img-vi" src="./Home_page.svg" alt="home" class="hidden" />
    </main>

    <div class="lang-switcher">
        <button class="lang-btn" id="btn-vi" onclick="switchLang('vi')">
            <span class="flag">🇻🇳</span>Tiếng Việt
        </button>
        <button class="lang-btn active" id="btn-zh" onclick="switchLang('zh')">
            <span class="flag">🇨🇳</span>中文
        </button>
    </div>

    <script>
        let currentLang = 'zh';

        function switchLang(lang) {
            if (lang === currentLang) return;
            currentLang = lang;

            document.getElementById('img-vi').classList.toggle('hidden', lang !== 'vi');
            document.getElementById('img-zh').classList.toggle('hidden', lang !== 'zh');

            document.getElementById('btn-vi').classList.toggle('active', lang === 'vi');
            document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
        }

        document.addEventListener("contextmenu", e => e.preventDefault());

        document.addEventListener("keydown", function(e) {
            if (e.keyCode === 123) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && ["I", "J", "C"].includes(e.key)) e.preventDefault();
            if (e.ctrlKey && e.key === "U") e.preventDefault();
        });
    </script>
</body>
</html>
